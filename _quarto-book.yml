project:
  type: book

book:
  title: \SunQuarTeX Example - Book 
  author: sun123zxy
  date: 2026/04/24
  date-format: "[April, 2026]"
  chapters:
    - index.qmd # book's meta information follows here
    - part: 文章
      chapters:
        - examples/cnart.qmd
        - examples/enart.qmd
  site-url: https://sun123zxy.github.io/sunquartex/

bibliography: examples/bibliography.bib

shift-heading-level-by: 0 # Seemingly Quarto will -1 automatically for books. So leave this at 0.

format:
  pdf:
    documentclass: book
    custom-theorem:
      numbered-within: chapter
      numbered-alike: true